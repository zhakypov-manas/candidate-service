spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/cvscan
    username: cvscan
    password: cvscan
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: candidate-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  output:
    ansi:
      enabled: always
kafka:
  topics:
    cv-parsed: cv.parsed
    status-changed: candidate.status.changed

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  pattern:
     console: "%clr(%d{yyyy-MM-dd HH:mm:ss}){faint} %clr([%thread]){blue} %clr([%X{requestId}]){yellow} %clr(%-5level){highlight} %clr(%logger{36}){cyan} - %msg%n"
  level:
    kg.tunduk: DEBUG
    org.springframework.kafka: INFO